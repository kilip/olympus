---
dependency:
  name: galaxy
driver:
  name: docker
platforms:
  - name: hera-dev
    hostname: hera-dev
    image: "kilip/molecule-${MOLECULE_DIST:-ubuntu}:${MOLECULE_DIST_VERSION:-20.04}"
    pre_build_image: true
    privileged: true
    command: ${MOLECULE_DOCKER_COMMAND:-""}
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:ro
    groups: ["master", "etcd", "proxy", "k3s_nodes"]
  - name: aion-dev
    hostname: aion-dev
    image: "kilip/molecule-${MOLECULE_DIST:-ubuntu}:${MOLECULE_DIST_VERSION:-20.04}"
    pre_build_image: true
    privileged: true
    command: ${MOLECULE_DOCKER_COMMAND:-""}
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:ro
    groups: ["master", "etcd", "k3s_nodes"]
  - name: mars-dev
    hostname: mars-dev
    image: "kilip/molecule-${MOLECULE_DIST:-ubuntu}:${MOLECULE_DIST_VERSION:-20.04}"
    pre_build_image: true
    privileged: true
    command: ${MOLECULE_DOCKER_COMMAND:-""}
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:ro
    groups: ["master", "etcd", "k3s_nodes"]

provisioner:
  name: ansible
  env:
    ANSIBLE_ROLES_PATH: "../../roles"
    MOLECULE_NO_LOG: false
  inventory:
    links:
      #hosts: "./inventory/hosts.ini"
      group_vars: "./inventory/group_vars"
      host_vars: "./inventory/host_vars"
  playbooks:
    converge: "../../playbook-converge.yml"
    #converge: "../../.scratches/debug.yml"
    verify: "../../playbook-verify.yml"
verifier:
  name: ansible