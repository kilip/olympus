- name: include prerequisite role
  include_role:
    name: "./vendor/k3s-ansible/roles/prereq"

- name: set control node
  set_fact:
    control_node: "{{ groups['master'][0] }}"

- name: downloading k3s
  include: download.yml

- name: Store Master node-token
  block:
    - name: install/configures control node
      include: build/control-node.yml
      when: control_node == inventory_hostname
    - name: set cluster token
      set_fact:
        cluster_token: "{{ hostvars[control_node]['token'] }}"
    - name: set extra server args
      set_fact:
        extra_server_args: "{{ extra_server_args + ['--token \"' ~ cluster_token ~ '\"']}}"
    - name: build secondary master
      include: build/master-node.yml
      when: "control_node != inventory_hostname"
  when: '"master" in group_names'
