---
- name: check k3s service state
  set_fact:
    state: "{{ services['k3s.service']['state'] | default('undefined') }}"

- name: set handler
  set_fact:
    handler: "{{ 'restart k3s' if state == 'running' else 'start k3s' }}"
  
- name: Copy K3s service file
  register: k3s_service
  template:
    src: "master.service.j2"
    dest: "{{ systemd_dir }}/k3s.service"
    owner: root
    group: root
    mode: 0755
  notify: "{{ handler }}"
