- name: copy cert files to etcd nodes
  copy:
    src: "{{ etcd_cert_local_temp_dir }}/{{ item.src }}"
    dest: "{{ cert_path }}/{{ item.dest }}"
  with_items:
    - src: "ca.pem"
      dest: "etcd-ca.crt"
    - src: "{{ ansible_hostname }}.pem"
      dest: "server.crt"
    - src: "{{ ansible_hostname }}-key.pem"
      dest: "server.key"

- name: ensure access to server.key file
  file:
    path: "/etc/etcd/server.key"
    mode: "0600"

  
- debug: var=etcd_initial_cluster

- name: generate etcd config
  template:
    src: "etcd.conf.j2"
    dest: "/etc/etcd/etcd.conf"
  notify: restart etcd