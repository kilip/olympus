name: Converge

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  converge:
    name: "Scenario: ${{ matrix.scenario }} (${{matrix.distro}})"
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
        - distro: ubuntu:20.04
          scenario: default
        #- distro: ubuntu:20.04
        #  scenario: cluster
      fail-fast: false
    steps:
      - name: Check out the codebase.
        uses: actions/checkout@v2

      - name: Set up Python 3.
        uses: actions/setup-python@v2
        with:
          python-version: '3.x'

      - name: Install test dependencies.
        run: |
          pip3 install -r requirements.txt
          ansible-galaxy install -r galaxy.yml --ignore-errors
        continue-on-error: true

      - name: Run Molecule tests.
        run: |
          mkdir -p /tmp/vault \
          && echo "$env:VAULT_PASSWORD" > "$env:ANSIBLE_VAULT_PASSWORD_FILE" \
          && cat /tmp/vault/password \
          && molecule test -s "${SCENARIO}"
        env:
          PY_COLORS: '1'
          ANSIBLE_FORCE_COLOR: '1'
          MOLECULE_DIST: ${{ matrix.distro }}
          SCENARIO: ${{ matrix.scenario }}
          VAULT_PASSOWRD: ${{ secrets.VAULT_PASSWORD }}
          ANSIBLE_VAULT_PASSWORD_FILE: "/tmp/vault/password"
