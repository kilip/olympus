---
_pwd: "{{ lookup('env', 'PWD') }}"
# k3s nodes setup
k3s_version: v1.18.3+k3s1
ansible_user: toni
systemd_dir: /etc/systemd/system
master_ip: "{{ hostvars[groups['master'][0]]['ansible_host'] | default(groups['master'][0]) }}"
extra_server_args: |
  --tls-san k3s.itstoni.com --no-deploy traefik --no-deploy servicelb --no-deploy metrics-server --no-deploy local-storage --flannel-backend=host-gw --datastore-endpoint="postgres://olympus:olympus@10.0.10.11:5432/database-name"

#ca_pem_file: "{{ playbook_dir }}/.secrets/cfssl/ca.pem"