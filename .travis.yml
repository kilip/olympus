---
dist: focal
addons:
  snaps:
    - name: task
      confinement: classic

language: python
services: docker

env:
  matrix:
    - MOLECULE_DIST: ubuntu:20.04
      SCENARIO: default

install:
  # Install test dependencies.
  - touch .env
  - task deps
  - mkdir -p vault
  - echo "${VAULT_PASSWORD}" >> ./vault/password

script:
  # Run tests.
  - ANSIBLE_VAULT_PASSWORD_FILE=./vault/password molecule test -s "${SCENARIO}"