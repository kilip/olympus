---
dist: focal
addons:
  snaps:
    - name: task
      confinement: classic

language: python
services: docker

env:
  matrix:
    - MOLECULE_DIST: ubuntu:20.04
    - MOLECULE_DIST: centos:8
  allow_failures:
    - MOLECULE_DIST: centos:8

install:
  # Install test dependencies.
  - touch .env
  - task deps

script:
  # Run tests.
  - molecule test
  - molecule test -s cluster